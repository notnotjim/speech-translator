<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Speech Translator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #050505;
    --live: #ffffff;
    --prev: #999;
    --accent: #c0392b;
  }

  body {
    font-family: 'Outfit', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--live);
    height: 100vh;
    overflow: hidden;
  }

  /* ═══ SETUP ═══ */
  .setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 2rem;
  }
  .setup h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.08em; margin-bottom: 0.3rem; }
  .setup .sub { font-size: 0.95rem; color: #777; margin-bottom: 3rem; }
  .row { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 1.5rem; }
  .row label { font-size: 0.9rem; color: #999; width: 110px; text-align: right; }
  select { font-family: inherit; font-size: 1rem; padding: 0.6rem 1rem; background: #111; color: #ccc; border: 1px solid #333; border-radius: 6px; width: 220px; outline: none; }
  .go-btn { margin-top: 2rem; font-family: inherit; font-size: 1.1rem; font-weight: 600; padding: 0.9rem 2.5rem; background: #fff; color: #000; border: none; border-radius: 8px; cursor: pointer; }
  .go-btn:hover { background: #e0e0e0; }
  .hint { margin-top: 1.2rem; font-size: 0.75rem; color: #666; max-width: 340px; text-align: center; line-height: 1.5; }
  .err { color: var(--accent); font-size: 0.85rem; margin-top: 0.8rem; }

  /* ═══ TRANSLATOR ═══ */
  .translator { display: none; height: 100vh; flex-direction: column; }
  .translator.on { display: flex; }

  .cols { flex: 1; display: flex; }

  /* Each column is a flex column: label, prev zone, live zone */
  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col + .col { border-left: 1px solid #1a1a1a; }

  /* Language label - fixed small strip */
  .lang-label {
    flex: 0 0 auto;
    text-align: center;
    padding: 1.2rem 1rem 0.5rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  /* Prev zone - top 30%, holds one fading previous line */
  .prev-zone {
    flex: 0 0 30%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0 2rem 1rem;
    overflow: hidden;
  }

  .prev {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--prev);
    line-height: 1.4;
    width: 100%;
    transition: opacity 1.2s ease;
    opacity: 1;
  }
  .prev.hide { opacity: 0; }
  .prev:empty { visibility: hidden; }

  /* Live zone - bottom 70%, vertically centres the live text */
  .live-zone {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1rem 2rem 2rem;
    overflow: hidden;
    border-top: 1px solid #111;
  }

  .live {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--live);
    line-height: 1.4;
    width: 100%;
  }
  .live.idle {
    font-weight: 300;
    color: #2a2a2a;
    font-size: 1.3rem;
  }

  /* ═══ STATUS BAR ═══ */
  .bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    padding: 0.6rem;
    background: var(--bg);
    border-top: 1px solid #151515;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #222; }
  .dot.on { background: var(--accent); animation: glow 1.8s ease infinite; }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.35); }
    50% { box-shadow: 0 0 0 6px rgba(192,57,43,0); }
  }
  .bar span { font-size: 0.7rem; color: #555; }
  .bar button { font-family: inherit; font-size: 0.65rem; padding: 0.2rem 0.6rem; background: none; color: #555; border: 1px solid #333; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>

<div class="setup" id="S">
  <h1>Live Speech Translator</h1>
  <div class="sub">Dual-language subtitles for live speeches</div>
  <div class="row"><label>Language 1</label>
    <select id="L1">
      <option value="en-GB" data-c="en" data-n="English">English (UK)</option>
      <option value="en-US" data-c="en" data-n="English">English (US)</option>
      <option value="ja" data-c="ja" data-n="日本語">Japanese</option>
      <option value="zh-CN" data-c="zh" data-n="中文">Chinese</option>
      <option value="ko-KR" data-c="ko" data-n="한국어">Korean</option>
      <option value="fr-FR" data-c="fr" data-n="Français">French</option>
      <option value="de-DE" data-c="de" data-n="Deutsch">German</option>
      <option value="es-ES" data-c="es" data-n="Español">Spanish</option>
      <option value="it-IT" data-c="it" data-n="Italiano">Italian</option>
      <option value="pt-BR" data-c="pt" data-n="Português">Portuguese</option>
    </select>
  </div>
  <div class="row"><label>Language 2</label>
    <select id="L2">
      <option value="ja" data-c="ja" data-n="日本語">Japanese</option>
      <option value="en-GB" data-c="en" data-n="English">English (UK)</option>
      <option value="en-US" data-c="en" data-n="English">English (US)</option>
      <option value="zh-CN" data-c="zh" data-n="中文">Chinese</option>
      <option value="ko-KR" data-c="ko" data-n="한국어">Korean</option>
      <option value="fr-FR" data-c="fr" data-n="Français">French</option>
      <option value="de-DE" data-c="de" data-n="Deutsch">German</option>
      <option value="es-ES" data-c="es" data-n="Español">Spanish</option>
      <option value="it-IT" data-c="it" data-n="Italiano">Italian</option>
      <option value="pt-BR" data-c="pt" data-n="Português">Portuguese</option>
    </select>
  </div>
  <button class="go-btn" onclick="start()">Start</button>
  <div class="hint">Chrome only · Space to switch speaker · HDMI to projector</div>
  <div class="err" id="E"></div>
</div>

<div class="translator" id="T">
  <div class="cols">
    <div class="col">
      <div class="lang-label" id="N1"></div>
      <div class="prev-zone"><div class="prev" id="P1"></div></div>
      <div class="live-zone"><div class="live idle" id="A1">Waiting for speech…</div></div>
    </div>
    <div class="col">
      <div class="lang-label" id="N2"></div>
      <div class="prev-zone"><div class="prev" id="P2"></div></div>
      <div class="live-zone"><div class="live idle" id="A2">Waiting for speech…</div></div>
    </div>
  </div>
  <div class="bar">
    <div class="dot" id="D"></div>
    <span id="ST">…</span>
    <button onclick="end()">Stop</button>
  </div>
</div>

<script>
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var r, go = false, side = 1, c1, c2, sp = false;
var iT, dT, snapT, lastSnap = '';

function gl(s) {
  var o = s.options[s.selectedIndex];
  return { s: o.value, t: o.dataset.c, n: o.dataset.n };
}

async function tx(t, to) {
  try {
    var r = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=' + to + '&dt=t&q=' + encodeURIComponent(t));
    var d = await r.json();
    return d[0].map(function(x) { return x[0]; }).join('') || t;
  } catch(e) { return t; }
}

function oA() { return document.getElementById(side === 1 ? 'A1' : 'A2'); }
function tA() { return document.getElementById(side === 1 ? 'A2' : 'A1'); }
function oP() { return document.getElementById(side === 1 ? 'P1' : 'P2'); }
function tP() { return document.getElementById(side === 1 ? 'P2' : 'P1'); }
function cur() { return side === 1 ? c1 : c2; }
function oth() { return side === 1 ? c2 : c1; }

function pushPrev(prevEl, text) {
  if (!text) return;
  prevEl.textContent = text;
  prevEl.classList.remove('hide');
  if (prevEl._t) clearTimeout(prevEl._t);
  prevEl._t = setTimeout(function() {
    prevEl.classList.add('hide');
    setTimeout(function() { prevEl.textContent = ''; prevEl.classList.remove('hide'); }, 1300);
  }, 4000);
}

function snap() {
  var a = oA(), p = oP(), ta = tA(), tp = tP();
  var txt = a.textContent.trim();
  if (!txt || a.classList.contains('idle') || txt === lastSnap) return;
  lastSnap = txt;
  pushPrev(p, txt);
  var ttxt = ta.textContent.trim();
  if (ttxt && !ta.classList.contains('idle')) pushPrev(tp, ttxt);
  a.textContent = '';
  ta.textContent = '';
}

function start() {
  if (!SR) { document.getElementById('E').textContent = 'Use Chrome.'; return; }
  c1 = gl(document.getElementById('L1'));
  c2 = gl(document.getElementById('L2'));
  if (c1.t === c2.t) { document.getElementById('E').textContent = 'Pick two different languages.'; return; }

  document.getElementById('N1').textContent = c1.n;
  document.getElementById('N2').textContent = c2.n;
  document.getElementById('P1').textContent = '';
  document.getElementById('P2').textContent = '';
  document.getElementById('A1').textContent = 'Waiting for speech\u2026';
  document.getElementById('A1').className = 'live idle';
  document.getElementById('A2').textContent = 'Waiting for speech\u2026';
  document.getElementById('A2').className = 'live idle';
  document.getElementById('S').style.display = 'none';
  document.getElementById('T').classList.add('on');

  go = true; side = 1; sp = false; lastSnap = '';

  r = new SR();
  r.lang = c1.s;
  r.interimResults = true;
  r.continuous = true;

  snapT = setInterval(snap, 3000);

  r.onresult = function(ev) {
    var im = '', fn = '';
    for (var i = ev.resultIndex; i < ev.results.length; i++) {
      if (ev.results[i].isFinal) fn += ev.results[i][0].transcript;
      else im += ev.results[i][0].transcript;
    }

    var a = oA(), ta = tA(), p = oP(), tp = tP(), to = oth().t;
    document.getElementById('D').classList.add('on');
    document.getElementById('ST').textContent = cur().n + ' \u2014 Space to switch';

    if (im.trim()) {
      a.textContent = im;
      a.className = 'live';
      clearTimeout(iT);
      iT = setTimeout(function() {
        tx(im.trim(), to).then(function(x) {
          if (!fn) { ta.textContent = x; ta.className = 'live'; }
        });
      }, 120);
    }

    if (fn.trim()) {
      clearTimeout(iT); clearTimeout(dT);
      lastSnap = '';

      var old = a.textContent.trim();
      if (old && !a.classList.contains('idle')) pushPrev(p, old);

      a.textContent = fn;
      a.className = 'live';

      dT = setTimeout(function() {
        var oldT = ta.textContent.trim();
        if (oldT && !ta.classList.contains('idle')) pushPrev(tp, oldT);

        tx(fn.trim(), to).then(function(x) {
          ta.textContent = x;
          ta.className = 'live';
        });
      }, 50);
    }
  };

  r.onerror = function(ev) {
    if (ev.error === 'no-speech') {
      document.getElementById('D').classList.remove('on');
      document.getElementById('ST').textContent = 'Waiting\u2026 (' + cur().n + ')';
    }
  };

  r.onend = function() {
    if (!go) return;
    if (sp) { sp = false; r.lang = cur().s; document.getElementById('ST').textContent = cur().n + ' \u2014 Space to switch'; }
    try { r.start(); } catch(e) {}
  };

  r.start();
  document.getElementById('D').classList.add('on');
  document.getElementById('ST').textContent = c1.n + ' \u2014 Space to switch';
  document.addEventListener('keydown', key);
}

function key(e) {
  if (e.code === 'Space' && go) {
    e.preventDefault();
    side = side === 1 ? 2 : 1;
    sp = true; lastSnap = '';
    document.getElementById('ST').textContent = 'Switching\u2026';
    try { r.stop(); } catch(e) {}
  }
}

function end() {
  go = false;
  if (snapT) clearInterval(snapT);
  if (r) try { r.stop(); } catch(e) {}
  r = null;
  document.removeEventListener('keydown', key);
  document.getElementById('T').classList.remove('on');
  document.getElementById('S').style.display = 'flex';
  document.getElementById('D').classList.remove('on');
}
</script>
</body>
</html>
