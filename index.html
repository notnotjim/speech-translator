<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Speech Translator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&family=Noto+Sans+JP:wght@300;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit','Noto Sans JP',sans-serif;background:#050505;color:#fff;height:100vh;overflow:hidden}

.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:2rem}
.setup h1{font-size:2rem;font-weight:300;letter-spacing:.08em;margin-bottom:.3rem}
.setup .sub{font-size:.95rem;color:#777;margin-bottom:3rem}
.row{display:flex;align-items:center;gap:1.2rem;margin-bottom:1.5rem}
.row label{font-size:.9rem;color:#999;width:110px;text-align:right}
select{font-family:inherit;font-size:1rem;padding:.6rem 1rem;background:#111;color:#ccc;border:1px solid #333;border-radius:6px;width:220px;outline:none}
.go-btn{margin-top:2rem;font-family:inherit;font-size:1.1rem;font-weight:500;padding:.9rem 2.5rem;background:#fff;color:#000;border:none;border-radius:8px;cursor:pointer}
.hint{margin-top:1.2rem;font-size:.75rem;color:#666;max-width:340px;text-align:center;line-height:1.5}
.err{color:#c0392b;font-size:.85rem;margin-top:.8rem}

.translator{display:none;height:100vh;flex-direction:column}
.translator.on{display:flex}
.cols{flex:1;display:flex}
.col{flex:1;display:flex;align-items:flex-end;justify-content:center;padding:0 2rem 25vh;overflow:hidden;position:relative}
.col+.col{border-left:1px solid #1a1a1a}

.col::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:65%;
  background:linear-gradient(to bottom,#050505 0%,#050505 40%,transparent 100%);
  z-index:2;
  pointer-events:none;
}

.lang-label{position:absolute;top:1.5rem;left:50%;transform:translateX(-50%);font-size:.75rem;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:.2em;z-index:3}

.live{
  text-align:center;
  font-size:2.4rem;
  font-weight:500;
  line-height:1.4;
  width:90%;
  background:linear-gradient(to bottom,#fff 0%,#fff calc(100% - 3.36rem),#39FF14 calc(100% - 3.36rem),#39FF14 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.live.idle{
  font-weight:300;
  font-size:1.2rem;
  background:none;
  -webkit-text-fill-color:#1a1a1a;
  color:#1a1a1a;
}

.bar{display:flex;align-items:center;justify-content:center;gap:.8rem;padding:.6rem;background:#050505;border-top:1px solid #111}
.dot{width:8px;height:8px;border-radius:50%;background:#222}
.dot.on{background:#c0392b;animation:g 1.8s ease infinite}
@keyframes g{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.35)}50%{box-shadow:0 0 0 6px rgba(192,57,43,0)}}
.bar span{font-size:.7rem;color:#555}
.bar button{font-family:inherit;font-size:.65rem;padding:.2rem .6rem;background:none;color:#555;border:1px solid #333;border-radius:4px;cursor:pointer}
</style>
</head>
<body>
<div class="setup" id="S">
  <h1>Live Speech Translator</h1>
  <div class="sub">Dual-language subtitles for live speeches</div>
  <div class="row"><label>Language 1</label><select id="L1"><option value="en-GB" data-c="en" data-n="English">English (UK)</option><option value="en-US" data-c="en" data-n="English">English (US)</option><option value="ja" data-c="ja" data-n="日本語">Japanese</option><option value="zh-CN" data-c="zh" data-n="中文">Chinese</option><option value="ko-KR" data-c="ko" data-n="한국어">Korean</option><option value="fr-FR" data-c="fr" data-n="Français">French</option><option value="de-DE" data-c="de" data-n="Deutsch">German</option><option value="es-ES" data-c="es" data-n="Español">Spanish</option><option value="it-IT" data-c="it" data-n="Italiano">Italian</option><option value="pt-BR" data-c="pt" data-n="Português">Portuguese</option></select></div>
  <div class="row"><label>Language 2</label><select id="L2"><option value="ja" data-c="ja" data-n="日本語">Japanese</option><option value="en-GB" data-c="en" data-n="English">English (UK)</option><option value="en-US" data-c="en" data-n="English">English (US)</option><option value="zh-CN" data-c="zh" data-n="中文">Chinese</option><option value="ko-KR" data-c="ko" data-n="한국어">Korean</option><option value="fr-FR" data-c="fr" data-n="Français">French</option><option value="de-DE" data-c="de" data-n="Deutsch">German</option><option value="es-ES" data-c="es" data-n="Español">Spanish</option><option value="it-IT" data-c="it" data-n="Italiano">Italian</option><option value="pt-BR" data-c="pt" data-n="Português">Portuguese</option></select></div>
  <button class="go-btn" onclick="start()">Start</button>
  <div class="hint">Chrome only · Space to switch speaker</div>
  <div class="err" id="E"></div>
</div>
<div class="translator" id="T">
  <div class="cols">
    <div class="col"><div class="lang-label" id="N1"></div><div class="live idle" id="A1">Waiting for speech…</div></div>
    <div class="col"><div class="lang-label" id="N2"></div><div class="live idle" id="A2">Waiting for speech…</div></div>
  </div>
  <div class="bar"><div class="dot" id="D"></div><span id="ST">…</span><button onclick="end()">Stop</button></div>
</div>
<script>
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var r,on=false,side=1,c1,c2,sp=false;
var lastSent='',txId=0;

function gl(s){var o=s.options[s.selectedIndex];return{s:o.value,t:o.dataset.c,n:o.dataset.n}}

async function tx(t,to){
  try{var r=await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl='+to+'&dt=t&q='+encodeURIComponent(t));
  var d=await r.json();return d[0].map(function(x){return x[0]}).join('')||t}catch(e){return t}
}

function oA(){return document.getElementById(side===1?'A1':'A2')}
function tA(){return document.getElementById(side===1?'A2':'A1')}
function cur(){return side===1?c1:c2}
function oth(){return side===1?c2:c1}

function doTranslate(text,ta,to){
  if(text===lastSent)return;
  lastSent=text;
  var id=++txId;
  tx(text,to).then(function(x){
    if(id===txId){ta.textContent=x;ta.className='live'}
  });
}

function start(){
  if(!SR){document.getElementById('E').textContent='Use Chrome.';return}
  c1=gl(document.getElementById('L1'));
  c2=gl(document.getElementById('L2'));
  if(c1.t===c2.t){document.getElementById('E').textContent='Pick two different languages.';return}

  document.getElementById('N1').textContent=c1.n;
  document.getElementById('N2').textContent=c2.n;
  document.getElementById('A1').textContent='Waiting for speech\u2026';
  document.getElementById('A1').className='live idle';
  document.getElementById('A2').textContent='Waiting for speech\u2026';
  document.getElementById('A2').className='live idle';
  document.getElementById('S').style.display='none';
  document.getElementById('T').classList.add('on');

  on=true;side=1;sp=false;lastSent='';txId=0;
  r=new SR();
  r.lang=c1.s;
  r.interimResults=true;
  r.continuous=true;

  r.onresult=function(ev){
    var im='',fn='';
    for(var i=ev.resultIndex;i<ev.results.length;i++){
      if(ev.results[i].isFinal)fn+=ev.results[i][0].transcript;
      else im+=ev.results[i][0].transcript;
    }
    var a=oA(),ta=tA(),to=oth().t;
    document.getElementById('D').classList.add('on');
    document.getElementById('ST').textContent=cur().n+' \u2014 Space to switch';

    if(im.trim()){
      a.textContent=im;
      a.className='live';
      doTranslate(im.trim(),ta,to);
    }

    if(fn.trim()){
      a.textContent=fn;
      a.className='live';
      lastSent='';
      doTranslate(fn.trim(),ta,to);
    }
  };

  r.onerror=function(ev){
    if(ev.error==='no-speech'){
      document.getElementById('D').classList.remove('on');
      document.getElementById('ST').textContent='Waiting\u2026 ('+cur().n+')';
    }
  };

  r.onend=function(){
    if(!on)return;
    if(sp){sp=false;r.lang=cur().s;document.getElementById('ST').textContent=cur().n+' \u2014 Space to switch'}
    try{r.start()}catch(e){}
  };

  r.start();
  document.getElementById('D').classList.add('on');
  document.getElementById('ST').textContent=c1.n+' \u2014 Space to switch';
  document.addEventListener('keydown',key);
}

function key(e){
  if(e.code==='Space'&&on){
    e.preventDefault();
    side=side===1?2:1;
    sp=true;
    document.getElementById('ST').textContent='Switching\u2026';
    try{r.stop()}catch(e){}
  }
}

function end(){
  on=false;
  if(r)try{r.stop()}catch(e){}
  r=null;
  document.removeEventListener('keydown',key);
  document.getElementById('T').classList.remove('on');
  document.getElementById('S').style.display='flex';
  document.getElementById('D').classList.remove('on');
}
</script>
</body>
</html>
