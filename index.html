<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Speech Translator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans', 'Noto Sans JP', sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; overflow: hidden; }

  .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .setup-screen h1 { font-size: 2.4rem; font-weight: 300; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
  .setup-screen p { font-size: 1.1rem; color: #888; margin-bottom: 3rem; }
  .lang-row { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; }
  .lang-row label { font-size: 1rem; color: #aaa; width: 140px; text-align: right; }
  select { font-family: inherit; font-size: 1.1rem; padding: 0.7rem 1.2rem; background: #1a1a1a; color: #f0f0f0; border: 1px solid #333; border-radius: 8px; width: 260px; cursor: pointer; outline: none; }
  .start-btn { margin-top: 2rem; font-family: inherit; font-size: 1.2rem; font-weight: 500; padding: 1rem 3rem; background: #e8e8e8; color: #0a0a0a; border: none; border-radius: 12px; cursor: pointer; }
  .start-btn:hover { background: #fff; }
  .note { margin-top: 1.5rem; font-size: 0.85rem; color: #666; max-width: 400px; text-align: center; line-height: 1.5; }
  .error-msg { color: #e74c3c; font-size: 0.95rem; margin-top: 1rem; text-align: center; }

  .translator-screen { display: none; height: 100vh; flex-direction: column; }
  .translator-screen.active { display: flex; }
  .panels { flex: 1; display: flex; flex-direction: row; }
  .panel { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; }
  .panel:first-child { border-right: 1px solid #1a1a1a; }
  .panel-lang { position: absolute; top: 1.2rem; left: 50%; transform: translateX(-50%); font-size: 0.85rem; font-weight: 500; color: #444; text-transform: uppercase; letter-spacing: 0.15em; z-index: 2; }

  .lines {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 4rem 2.5rem 15vh;
    flex: 1;
    gap: 0.8rem;
    overflow: hidden;
  }

  .line {
    text-align: center;
    line-height: 1.35;
    font-size: 2.4rem;
    font-weight: 400;
    transition: color 0.15s ease, opacity 0.8s ease;
  }

  .line.prev {
    color: #777;
    opacity: 0.5;
  }
  .line.prev-recent {
    color: #888;
    opacity: 0.7;
  }

  .line.current, .line.typing {
    font-weight: 500;
    color: #ffffff;
    opacity: 1;
  }

  .line.fading {
    opacity: 0 !important;
    color: #444 !important;
  }

  .line.waiting {
    font-weight: 300;
    color: #1a1a1a;
  }

  .status-bar { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 0.8rem; border-top: 1px solid #181818; background: #0a0a0a; }
  .mic-dot { width: 10px; height: 10px; border-radius: 50%; background: #222; }
  .mic-dot.on { background: #e74c3c; animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); } 50% { box-shadow: 0 0 0 8px rgba(231,76,60,0); } }
  .status-text { font-size: 0.8rem; color: #444; }
  .stop-btn { font-family: inherit; font-size: 0.75rem; padding: 0.3rem 0.8rem; background: none; color: #555; border: 1px solid #2a2a2a; border-radius: 5px; cursor: pointer; margin-left: 0.5rem; }
</style>
</head>
<body>

<div class="setup-screen" id="setup">
  <h1>Live Speech Translator</h1>
  <p>Dual-language live translation for speeches</p>
  <div class="lang-row"><label>Language 1</label>
    <select id="lang1">
      <option value="en-GB" data-code="en" data-name="English">English (UK)</option>
      <option value="en-US" data-code="en" data-name="English">English (US)</option>
      <option value="ja" data-code="ja" data-name="日本語">Japanese</option>
      <option value="zh-CN" data-code="zh" data-name="中文">Chinese</option>
      <option value="ko-KR" data-code="ko" data-name="한국어">Korean</option>
      <option value="fr-FR" data-code="fr" data-name="Français">French</option>
      <option value="de-DE" data-code="de" data-name="Deutsch">German</option>
      <option value="es-ES" data-code="es" data-name="Español">Spanish</option>
      <option value="it-IT" data-code="it" data-name="Italiano">Italian</option>
      <option value="pt-BR" data-code="pt" data-name="Português">Portuguese</option>
    </select>
  </div>
  <div class="lang-row"><label>Language 2</label>
    <select id="lang2">
      <option value="ja" data-code="ja" data-name="日本語">Japanese</option>
      <option value="en-GB" data-code="en" data-name="English">English (UK)</option>
      <option value="en-US" data-code="en" data-name="English">English (US)</option>
      <option value="zh-CN" data-code="zh" data-name="中文">Chinese</option>
      <option value="ko-KR" data-code="ko" data-name="한국어">Korean</option>
      <option value="fr-FR" data-code="fr" data-name="Français">French</option>
      <option value="de-DE" data-code="de" data-name="Deutsch">German</option>
      <option value="es-ES" data-code="es" data-name="Español">Spanish</option>
      <option value="it-IT" data-code="it" data-name="Italiano">Italian</option>
      <option value="pt-BR" data-code="pt" data-name="Português">Portuguese</option>
    </select>
  </div>
  <button class="start-btn" onclick="go()">Start Listening</button>
  <div class="note">Chrome only. Press Space to switch speaker language.</div>
  <div class="error-msg" id="err"></div>
</div>

<div class="translator-screen" id="trans">
  <div class="panels">
    <div class="panel">
      <div class="panel-lang" id="label1"></div>
      <div class="lines" id="lines1">
        <div class="line waiting">Waiting for speech...</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-lang" id="label2"></div>
      <div class="lines" id="lines2">
        <div class="line waiting">Waiting for speech...</div>
      </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="mic-dot" id="dot"></div>
    <span class="status-text" id="stat">...</span>
    <button class="stop-btn" onclick="stop()">Stop</button>
  </div>
</div>

<script>
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var rec, on = false, cl = 1, l1, l2, dt, it, sp = false;

function gl(s) { var o = s.options[s.selectedIndex]; return { sc: o.value, tc: o.dataset.code, nm: o.dataset.name }; }

async function tr(t, to) {
  try { var r = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl='+to+'&dt=t&q='+encodeURIComponent(t));
    var d = await r.json(); return d[0].map(function(x){return x[0]}).join('')||t; } catch(e) { return t; }
}

function oL() { return document.getElementById(cl===1?'lines1':'lines2'); }
function tL() { return document.getElementById(cl===1?'lines2':'lines1'); }
function cc() { return cl===1?l1:l2; }
function oc() { return cl===1?l2:l1; }

function restyle(container) {
  var finals = container.querySelectorAll('.line.final:not(.fading)');
  for (var i = 0; i < finals.length; i++) {
    finals[i].classList.remove('current', 'prev-recent', 'prev');
    if (i === finals.length - 1) {
      finals[i].classList.add('current');
      // Cancel any pending fade for the current line
      if (finals[i]._fadeTimer) { clearTimeout(finals[i]._fadeTimer); finals[i]._fadeTimer = null; }
    } else if (i === finals.length - 2) {
      finals[i].classList.add('prev-recent');
      // Start fade timer: go grey immediately, fade out after 4s
      if (!finals[i]._fadeTimer) {
        (function(el) {
          el._fadeTimer = setTimeout(function() {
            el.classList.add('fading');
            // Remove from DOM after fade animation completes
            setTimeout(function() { if (el.parentNode) el.remove(); }, 900);
          }, 4000);
        })(finals[i]);
      }
    } else {
      finals[i].classList.add('prev');
      // Older lines: fade sooner (2s)
      if (!finals[i]._fadeTimer) {
        (function(el) {
          el._fadeTimer = setTimeout(function() {
            el.classList.add('fading');
            setTimeout(function() { if (el.parentNode) el.remove(); }, 900);
          }, 2000);
        })(finals[i]);
      }
    }
  }
}

function setTyping(container, text) {
  var w = container.querySelector('.waiting');
  if (w) w.remove();
  var t = container.querySelector('.line.typing');
  if (t) {
    t.textContent = text;
  } else {
    t = document.createElement('div');
    t.className = 'line typing';
    t.textContent = text;
    container.appendChild(t);
  }
}

function commitFinal(container, text) {
  var w = container.querySelector('.waiting');
  if (w) w.remove();
  var t = container.querySelector('.line.typing');
  if (t) t.remove();
  var d = document.createElement('div');
  d.className = 'line final';
  d.textContent = text;
  container.appendChild(d);
  restyle(container);
}

function go() {
  if (!SR) { document.getElementById('err').textContent = 'Use Chrome.'; return; }
  l1 = gl(document.getElementById('lang1'));
  l2 = gl(document.getElementById('lang2'));
  if (l1.tc === l2.tc) { document.getElementById('err').textContent = 'Pick two different languages.'; return; }

  document.getElementById('label1').textContent = l1.nm;
  document.getElementById('label2').textContent = l2.nm;
  document.getElementById('lines1').innerHTML = '<div class="line waiting">Waiting for speech...</div>';
  document.getElementById('lines2').innerHTML = '<div class="line waiting">Waiting for speech...</div>';
  document.getElementById('setup').style.display = 'none';
  document.getElementById('trans').classList.add('active');

  on = true; cl = 1; sp = false;
  rec = new SR();
  rec.lang = l1.sc;
  rec.interimResults = true;
  rec.continuous = true;

  rec.onresult = function(ev) {
    var im = '', fn = '';
    for (var i = ev.resultIndex; i < ev.results.length; i++) {
      if (ev.results[i].isFinal) fn += ev.results[i][0].transcript;
      else im += ev.results[i][0].transcript;
    }
    var ol = oL(), tl = tL(), to = oc().tc;
    document.getElementById('dot').classList.add('on');
    document.getElementById('stat').textContent = cc().nm + ' \u2014 Space to switch';

    if (im.trim()) {
      setTyping(ol, im);
      clearTimeout(it);
      it = setTimeout(function() {
        tr(im.trim(), to).then(function(x) {
          if (!fn) setTyping(tl, x);
        });
      }, 120);
    }

    if (fn.trim()) {
      clearTimeout(it); clearTimeout(dt);
      commitFinal(ol, fn);
      dt = setTimeout(function() {
        tr(fn.trim(), to).then(function(x) {
          commitFinal(tl, x);
        });
      }, 50);
    }
  };

  rec.onerror = function(ev) {
    if (ev.error === 'no-speech') {
      document.getElementById('dot').classList.remove('on');
      document.getElementById('stat').textContent = 'Waiting... (' + cc().nm + ')';
    }
  };

  rec.onend = function() {
    if (!on) return;
    if (sp) { sp = false; rec.lang = cc().sc; document.getElementById('stat').textContent = cc().nm + ' \u2014 Space to switch'; }
    try { rec.start(); } catch(e) {}
  };

  rec.start();
  document.getElementById('dot').classList.add('on');
  document.getElementById('stat').textContent = l1.nm + ' \u2014 Space to switch';
  document.addEventListener('keydown', kh);
}

function kh(e) {
  if (e.code === 'Space' && on) {
    e.preventDefault();
    cl = cl === 1 ? 2 : 1;
    sp = true;
    document.getElementById('stat').textContent = 'Switching...';
    try { rec.stop(); } catch(e) {}
  }
}

function stop() {
  on = false;
  if (rec) try { rec.stop(); } catch(e) {}
  rec = null;
  document.removeEventListener('keydown', kh);
  document.getElementById('trans').classList.remove('active');
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('dot').classList.remove('on');
}
</script>
</body>
</html>
